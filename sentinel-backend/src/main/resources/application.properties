spring.application.name=sentinel
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Sentinel-Database}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
openai.api.key=${OPENAI_API_KEY}

app.jwt.secret=${JWT_SECRET:sentinel-local-development-secret-change-me-please-32-bytes-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.auth.cookie-name=${AUTH_COOKIE_NAME:sentinel_session}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}

sentinel.repo.max-file-size-bytes=2097152
sentinel.repo.temp-dir=./tmp/repos
sentinel.repo.ignored-directories=.git,node_modules,target,build,dist,out,.idea,.vscode,__pycache__,.venv,vendor
