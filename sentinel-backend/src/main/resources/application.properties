spring.application.name=sentinel
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Sentinel-Database}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
openai.api.key=${OPENAI_API_KEY}

app.jwt.secret=${JWT_SECRET:sentinel-local-development-secret-change-me-please-32-bytes-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
